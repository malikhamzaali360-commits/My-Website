<!DOCTYPE html>
<html>
<head>
    <title>Test Project</title>
    <style>
        body { background: #111; color: white; text-align: center; padding: 50px; font-family: sans-serif; }
        button { padding: 15px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>API Test</h1>
    <button onclick="testData()">Click to see if browser works</button>
    <div id="output" style="margin-top: 20px;"></div>

    <script>
        function testData() {
            // Hum ek free test API use kar rahe hain jo kabhi block nahi hoti
            fetch('https://jsonplaceholder.typicode.com/posts/1')
                .then(response => response.json())
                .then(json => {
                    document.getElementById('output').innerHTML = "Success! Data mil gaya: " + json.title;
                })
                .catch(err => {
                    document.getElementById('output').innerHTML = "Error aaya: " + err;
                });
        }
    </script>
</body>
</html>
