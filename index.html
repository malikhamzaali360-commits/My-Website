<!DOCTYPE html>
<html>
<head>
    <title>Live Flight Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([33.68, 73.04], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function fetchFlights() {
            try {
                // Yahan humne proxy ka link add kiya hai jo CORS error ko bypass karega
                let proxyUrl = 'https://corsproxy.io/?';
                let apiUrl = 'https://opensky-network.org/api/states/all';
                let response = await fetch(proxyUrl + encodeURIComponent(apiUrl));
                let data = await response.json();
                
                for(let i = 0; i < 100; i++) { 
                    let flight = data.states[i];
                    if(flight[6] && flight[5]) { 
                        L.marker([flight[6], flight[5]]).addTo(map)
                         .bindPopup("Flight: " + (flight[1] || "Unknown"));
                    }
                }
            } catch (error) {
                console.log("Abhi bhi error hai, lekin humne try kiya:", error);
            }
        }

        fetchFlights();
    </script>
</body>
</html>
