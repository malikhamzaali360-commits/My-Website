<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather App</title>
    <style>
        body { font-family: sans-serif; background: #0f2027; color: white; text-align: center; padding: 50px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px; cursor: pointer; background: #00ff41; border: none; border-radius: 5px; }
        .result { margin-top: 30px; font-size: 1.5em; }
    </style>
</head>
<body>

    <h1>Weather Forecast</h1>
    <input type="text" id="city" placeholder="City ka naam likhein...">
    <button onclick="getWeather()">Check Weather</button>

    <div class="result" id="display"></div>

    <script>
        async function getWeather() {
            let city = document.getElementById('city').value;
            let apiKey = '7d0d088924f79661f43c8d1976a9f029'; // Ye public key hai, isse testing ho jayegi
            let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

            try {
                let response = await fetch(url);
                let data = await response.json();
                document.getElementById('display').innerHTML = 
                    `Temperature in ${city}: ${data.main.temp}°C <br> Status: ${data.weather[0].description}`;
            } catch (error) {
                document.getElementById('display').innerHTML = "City nahi mili, sahi naam likhein!";
            }
        }
    </script>
</body>
</html>
