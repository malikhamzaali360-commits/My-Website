<!DOCTYPE html>
<html>
<head>
    <title>Live Flight Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Map initialize karna
        var map = L.map('map').setView([33.68, 73.04], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Flights ka data fetch karna (OpenSky Network)
        async function fetchFlights() {
            try {
                let response = await fetch('https://opensky-network.org/api/states/all');
                let data = await response.json();
                
                // Sirf pehle 50 jahaz dikhana taaki website hang na ho
                for(let i = 0; i < 50; i++) {
                    let flight = data.states[i];
                    if(flight[6] && flight[5]) { // Latitude aur Longitude check
                        L.marker([flight[6], flight[5]]).addTo(map)
                         .bindPopup("Callsign: " + flight[1]);
                    }
                }
            } catch (error) {
                console.log("Data fetch nahi ho saka:", error);
            }
        }

        fetchFlights();
    </script>
</body>
</html>
