<!DOCTYPE html>
<html>
<head>
    <title>My Flight Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 500px; width: 100%; }
        body { margin: 0; padding: 20px; background: #0a0a0a; color: #00ff41; }
    </style>
</head>
<body>
    <h1>Live Flight Tracker</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([33.68, 73.04], 6); // Rawalpindi ka view
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Yahan se asli data connect hoga (API Integration)
        L.marker([33.68, 73.04]).addTo(map).bindPopup("Islamabad/Rawalpindi");
    </script>
</body>
</html>
